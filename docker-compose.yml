version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://wp-core.linklian.org}
        - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-/v1}
        - NEXT_PUBLIC_GOOGLE_ANALYTICS=${NEXT_PUBLIC_GOOGLE_ANALYTICS:-}
        - NEXT_PUBLIC_CLASS_DETAIL_BG_IMAGE=${NEXT_PUBLIC_CLASS_DETAIL_BG_IMAGE:-https://uat-core.linklian.org/v1/assets/active/url}
    ports:
      - "4100:4100"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://wp-core.linklian.org}
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-/v1}
      - NEXT_PUBLIC_GOOGLE_ANALYTICS=${NEXT_PUBLIC_GOOGLE_ANALYTICS:-}
      - NEXT_PUBLIC_CLASS_DETAIL_BG_IMAGE=${NEXT_PUBLIC_CLASS_DETAIL_BG_IMAGE:-https://uat-core.linklian.org/v1/assets/active/url}
    mem_limit: 400m
    # volumes:
    #   - .:/app
    #   - /app/node_modules