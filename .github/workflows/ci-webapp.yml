name: LINKLIAN-WEBAPP CI

on:
  push:
    branches: ["main", "staging"]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - "next.config.*"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/ci-webapp.yml"

  pull_request:
    branches: ["main", "staging"]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - "next.config.*"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/ci-webapp.yml"

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-webapp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  secret-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    needs: [sast]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-git --redact --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci:
    name: App CI (SCA → Format → Compile → Test → Build)
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # SCA
      - name: SCA (npm audit)
        run: npm audit --audit-level=high

      # check format
      - name: Check format / lint
        run: npm run lint

      # check while compile
      - name: Typecheck (compile check)
        run: npm run typecheck

      # jest
      - name: Unit tests (Jest + coverage)
        run: npm run test:cov

      # build
      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-coverage
          path: coverage
          if-no-files-found: warn
          retention-days: 7

  container-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t linklian-webapp:local -f Dockerfile .

      - name: Trivy scan (HIGH / CRITICAL)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: linklian-webapp:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
